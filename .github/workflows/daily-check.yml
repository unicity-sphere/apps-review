# Manual-only utility: the moderation API uses a 2-hour wallet-session JWT,
# so this cannot run unattended on a schedule -- there's no long-lived
# credential to store as a secret. Trigger manually from the Actions tab
# right after generating a fresh QUEST_ADMIN_COOKIE token/secret.
name: Manual submission check

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run submission check
        env:
          QUEST_ADMIN_COOKIE: ${{ secrets.QUEST_ADMIN_COOKIE }}
        run: python scripts/check_new_submissions.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/moderation_review_full.csv index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "adjustments to the report"
            git push
          fi
